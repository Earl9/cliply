name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build signed Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build signed Tauri bundles
        id: tauri
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Cliply ${{ github.ref_name }}"
          releaseBody: |
            For manual installation, download `Cliply_*_x64-modern-installer.exe`.

            `Cliply_*_x64-setup.exe`, `.sig`, and `latest.json` are signed updater assets used by Cliply's in-app update flow.

            See CHANGELOG.md for release notes.
          releaseDraft: true
          prerelease: false
          args: --bundles nsis
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Normalize GitHub Release metadata
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.tauri.outputs.releaseId }}
        with:
          script: |
            const releaseId = Number(process.env.RELEASE_ID);
            if (!releaseId) {
              throw new Error("Missing release id from tauri-action");
            }

            const { owner, repo } = context.repo;
            const tagName = process.env.GITHUB_REF_NAME;
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: releaseId,
              name: `Cliply ${tagName}`,
              body: [
                "For manual installation, download `Cliply_*_x64-modern-installer.exe`.",
                "",
                "`Cliply_*_x64-setup.exe`, `.sig`, and `latest.json` are signed updater assets used by Cliply's in-app update flow.",
                "",
                "See CHANGELOG.md for release notes.",
              ].join("\n"),
              prerelease: false,
            });

      - name: Install modern installer dependencies
        run: npm ci --prefix apps/cliply-installer

      - name: Prepare modern installer payload
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/prepare-modern-installer-payload.ps1

      - name: Build modern installer
        working-directory: apps/cliply-installer
        run: npm run tauri -- build --no-bundle

      - name: Stage modern installer release asset
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $assetDir = Join-Path $PWD "release-assets"
          New-Item -ItemType Directory -Path $assetDir -Force | Out-Null
          $source = Join-Path $PWD "apps\cliply-installer\src-tauri\target\release\cliply-modern-installer.exe"
          $target = Join-Path $assetDir "Cliply_${version}_x64-modern-installer.exe"
          Copy-Item -Path $source -Destination $target -Force
          Get-FileHash -Algorithm SHA256 $target | Format-List

      - name: Upload modern installer to GitHub Release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.tauri.outputs.releaseId }}
          ASSET_DIR: release-assets
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const releaseId = Number(process.env.RELEASE_ID);
            if (!releaseId) {
              throw new Error("Missing release id from tauri-action");
            }

            const assetDir = process.env.ASSET_DIR;
            const { owner, repo } = context.repo;
            const existingAssets = await github.paginate(github.rest.repos.listReleaseAssets, {
              owner,
              repo,
              release_id: releaseId,
            });

            for (const fileName of fs.readdirSync(assetDir)) {
              const filePath = path.join(assetDir, fileName);
              const stat = fs.statSync(filePath);
              if (!stat.isFile()) {
                continue;
              }

              const existing = existingAssets.find((asset) => asset.name === fileName);
              if (existing) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: existing.id,
                });
              }

              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: releaseId,
                name: fileName,
                data: fs.readFileSync(filePath),
                headers: {
                  "content-type": "application/octet-stream",
                  "content-length": stat.size,
                },
              });
            }
